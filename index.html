<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doris</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .scene { display: none; }
        .scene.active { display: block; }
    </style>
</head>
<body>
    <!-- Scene 1: Cockpit -->
    <div class="scene" id="scene-cockpit">
        <div class="cockpit-bg">
            <img src="assets/cockpit.png" alt="Cockpit" class="cockpit-img">
            <div class="cockpit-light" style="left:31.6%;top:51.9%;width:7px;height:7px;animation-duration:3.4s;animation-delay:0s;"></div>
            <div class="cockpit-light" style="left:14.6%;top:90.7%;width:9px;height:9px;animation-duration:4.2s;animation-delay:0.8s;"></div>
            <div class="cockpit-light" style="left:71.9%;top:52.3%;width:7px;height:7px;animation-duration:3.7s;animation-delay:1.5s;"></div>
            <div class="cockpit-light" style="left:86.3%;top:83.0%;width:8px;height:8px;animation-duration:4.6s;animation-delay:0.4s;"></div>
            <div class="cockpit-light" style="left:49.3%;top:82.1%;width:6px;height:6px;animation-duration:3.1s;animation-delay:1.1s;"></div>
            <div class="episode" id="episode"></div>
            <div id="dial-instruction">
                &lt;-----&gt;
            </div>
            <div id="dial"></div>
            <button class="headphones-btn" aria-label="Toggle ambient sound">Unmute</button>
            <button class="mute-btn">Mute</button>
            <a href="#" class="turn-around-btn" data-scene="scene-door">Turn Around</a>
        </div>
    </div>

    <!-- Scene 2: Cockpit Door (landing page) -->
    <div class="scene active" id="scene-door">
        <div class="cockpit-bg">
            <img src="assets/cockpitDoor.png" alt="Cockpit Door" class="cockpit-img">
            <div id="door-arch">---</div>
            <button class="headphones-btn" aria-label="Toggle ambient sound">Unmute</button>
            <button class="mute-btn">Mute</button>
            <a href="#" class="turn-around-btn" data-scene="scene-cockpit">Turn Around</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
